policy:
  name: "DevSecOps Security Review Policy"
  version: "1.0"
  description: >
    このポリシーはコード差分(diff)を解析し、  
    セキュリティ問題を検出し、重大度評価・説明・修正案(diff)を  
    一貫した形式で生成するためのルールブックである。

  role: |
    あなたは Kubernetes セキュリティレビュー担当者です。
    あなたの目的はコードの変更(diff)を解析し、
    セキュリティリスクを検出し、
    根拠（Why）を説明し、
    重大度を分類し、
    安全な修正案（fix diff）を提示し、
    GitHub Pull Request 用の Markdown レポートを生成することです。
    あなたは勝手に仕様追加・機能変更をしてはいけません。
    diff に存在しないコードを読み取ってはいけません。

  analysis_steps: |
    1. 入力された diff を読み取る
    2. 変更された行を抽出する
    3. Security Rules（100項目）に照合する
    4. 一致した場合は脆弱性として登録
    5. Severity Rules に従って重大度を判定
    6. 修正案を diff 形式で生成
    7. PR コメント用 Markdown レポートを出力

  severity_rules: |
    Severity High:
      - 外部から悪用可能 (Exploit 可能性が高い)
      - 機密情報・認証情報の漏洩につながる
      - 認証 bypass / 認可 bypass
      - RCE / SQL Injection / SSRF / XSS / コマンドインジェクション
      - 特権昇格 / root 実行
      - Public exposure（外部に公開されてはならない設定）

    Severity Medium:
      - 内部条件で悪用可能
      - DoS / メモリ破壊 / 型不一致
      - 脆弱設定により将来的に High に発展する可能性がある
      - 足りない検証（未チェックの入力、例外処理不足）
      - 半分正しいが安全でない設定（認証ミス）

    Severity Low:
      - バグの温床
      - 安全性に軽度の影響
      - Hardening（強化）不足
      - ベストプラクティス未遵守

  output_format: |
    以下の Markdown 形式で GitHub PR コメントを生成してください。

    # Security Review Report

    ## 🧪 Summary
    - Total Issues: {{issue_count}}
    - High: {{high_count}} / Medium: {{medium_count}} / Low: {{low_count}}

    ---

    ## Detected Issues

    {{#each issues}}
    ### 🔸 Issue {{id}} — {{title}}
    **Severity:** {{severity}}

    **Reason (Why):**  
    {{reason}}

    **Found Code Snippet:**
    ```diff
    {{found_diff}}
    ```

    **Fix Proposal:**
    ```diff
    {{fix_diff}}
    ```
    ---
    {{/each}}

    ## Notes
    - 修正 diff は既存コードを意図せず変更してはいけません。
    - セキュリティ問題だけを修正してください。

  forbidden: |
    以下は禁止行為です。
    - 存在しない脆弱性を捏造する
    - diff に存在しないコードを解析する
    - 脆弱性と関係ない機能追加・書き換え
    - 危険な修正案を提案する
    - 100ルールに該当しない項目を勝手に追加する
    - “推測” でコードを生成する

rules:

  # =========================================================
  # 1. Kubernetes Deployment Security (1–25)
  # =========================================================
  - id: k8s_privileged_container
    target: k8s.deployment
    severity: HIGH
    description: "privileged コンテナは禁止"
    condition: container.securityContext.privileged == true
    recommendation: "privileged: false を設定する"

  - id: k8s_add_capabilities
    target: k8s.deployment
    severity: HIGH
    description: "capabilities.add の使用禁止"
    condition: container.securityContext.capabilities.add not empty
    recommendation: "drop: [ALL] を指定する"

  - id: k8s_allow_privilege_escalation
    target: k8s.deployment
    severity: HIGH
    description: "allowPrivilegeEscalation は false が推奨"
    condition: container.securityContext.allowPrivilegeEscalation == true
    recommendation: "allowPrivilegeEscalation: false を指定する"

  - id: k8s_run_as_root
    target: k8s.deployment
    severity: HIGH
    description: "root 実行は禁止"
    condition: container.securityContext.runAsUser == 0
    recommendation: "非 root ユーザーで実行する"

  - id: k8s_image_latest_tag
    target: k8s.deployment
    severity: MEDIUM
    description: "latest タグ禁止"
    condition: container.image endsWith ':latest'
    recommendation: "バージョン固定タグを使用する"

  - id: k8s_image_no_digest
    target: k8s.deployment
    severity: MEDIUM
    description: "image digest を指定すると安全"
    condition: container.image not contains '@sha256'
    recommendation: "image digest を指定する"

  - id: k8s_resource_limits_missing
    target: k8s.deployment
    severity: MEDIUM
    description: "limits がない"
    condition: container.resources.limits is null
    recommendation: "CPU/メモリ limits を設定"

  - id: k8s_liveness_probe_missing
    target: k8s.deployment
    severity: LOW
    description: "livenessProbe がない"
    condition: container.livenessProbe is null
    recommendation: "ヘルスチェックを追加する"

  - id: k8s_readiness_probe_missing
    target: k8s.deployment
    severity: LOW
    description: "readinessProbe がない"
    condition: container.readinessProbe is null
    recommendation: "readinessProbe を追加する"

  - id: k8s_pull_policy_missing
    target: k8s.deployment
    severity: LOW
    description: "imagePullPolicy が未設定"
    condition: container.imagePullPolicy is null
    recommendation: "Always または IfNotPresent を設定"

  - id: k8s_force_image_pull
    target: k8s.deployment
    severity: LOW
    description: "imagePullPolicy: Always を推奨"
    condition: container.imagePullPolicy != "Always"
    recommendation: "CI/CD で必ず最新を pull するため Always 推奨"

  - id: k8s_host_network
    target: k8s.deployment
    severity: HIGH
    description: "hostNetwork 許可は危険"
    condition: spec.hostNetwork == true
    recommendation: "hostNetwork を使わない"

  - id: k8s_host_pid_namespace
    target: k8s.deployment
    severity: HIGH
    description: "hostPID は危険"
    condition: spec.hostPID == true
    recommendation: "hostPID: false を設定"

  - id: k8s_host_ipc_namespace
    target: k8s.deployment
    severity: HIGH
    description: "hostIPC は危険"
    condition: spec.hostIPC == true
    recommendation: "hostIPC: false を設定"

  - id: k8s_read_only_root_fs
    target: k8s.deployment
    severity: MEDIUM
    description: "readOnlyRootFilesystem を有効にすべき"
    condition: container.securityContext.readOnlyRootFilesystem == false
    recommendation: "readOnlyRootFilesystem: true"

  - id: k8s_missing_app_label
    target: k8s.deployment
    severity: LOW
    description: "app ラベルは必須"
    condition: metadata.labels.app is null
    recommendation: "app: <name> を設定"

  - id: k8s_pod_antiaffinity_missing
    target: k8s.deployment
    severity: LOW
    description: "PodAntiAffinity 未設定"
    condition: spec.affinity.podAntiAffinity is null
    recommendation: "高可用性のために PodAntiAffinity を設定"

  - id: k8s_env_plaintext_password
    target: k8s.deployment
    severity: HIGH
    description: "環境変数にパスワードの平文がある"
    condition: env.value matches '(password|token)' 
    recommendation: "Secret を使用して保存"

  - id: k8s_env_secret_ref_missing
    target: k8s.deployment
    severity: HIGH
    description: "Secret 参照を使っていない"
    condition: env.value is not null and env.valueFrom.secretKeyRef is null
    recommendation: "valueFrom.secretKeyRef を使う"

  - id: k8s_volume_hostpath
    target: k8s.deployment
    severity: HIGH
    description: "hostPath は危険"
    condition: volume.hostPath is not null
    recommendation: "hostPath を使わない"

  - id: k8s_volume_emptydir_large
    target: k8s.deployment
    severity: LOW
    description: "emptyDir の使用注意"
    condition: volume.emptyDir is not null
    recommendation: "必要最小限の使用にする"

  - id: k8s_requests_missing
    target: k8s.deployment
    severity: MEDIUM
    description: "requests 未設定"
    condition: container.resources.requests is null
    recommendation: "requests を設定"

  - id: k8s_securitycontext_missing
    target: k8s.deployment
    severity: HIGH
    description: "securityContext がない"
    condition: container.securityContext is null
    recommendation: "securityContext を追加"

  - id: k8s_service_account_default
    target: k8s.deployment
    severity: HIGH
    description: "default ServiceAccount 使用禁止"
    condition: spec.serviceAccountName is null or spec.serviceAccountName == "default"
    recommendation: "専用 ServiceAccount を作成"

  - id: k8s_image_registry_public
    target: k8s.deployment
    severity: MEDIUM
    description: "public registry イメージは注意"
    condition: container.image contains "docker.io"
    recommendation: "プライベートレジストリ使用推奨"

  # =========================================================
  # 2. Kubernetes Service & Ingress (26–35)
  # =========================================================
  - id: k8s_service_loadbalancer_exposed
    target: k8s.service
    severity: HIGH
    description: "LoadBalancer 外部公開の注意"
    condition: spec.type == "LoadBalancer"
    recommendation: "必要な場合のみ使用"

  - id: k8s_service_nodeport_exposed
    target: k8s.service
    severity: HIGH
    description: "NodePort はセキュリティリスク高"
    condition: spec.type == "NodePort"
    recommendation: "NodePort を避ける"

  - id: k8s_ingress_tls_missing
    target: k8s.ingress
    severity: HIGH
    description: "Ingress に TLS 設定がない"
    condition: spec.tls is null
    recommendation: "HTTPS を有効にする"

  - id: k8s_ingress_allow_http
    target: k8s.ingress
    severity: MEDIUM
    description: "HTTP を許可している"
    condition: "annotations contains 'allow-http: \"true\"'"
    recommendation: "HTTPS 強制へ"

  - id: k8s_ingress_wildcard_host
    target: k8s.ingress
    severity: MEDIUM
    description: "ワイルドカードドメイン使用注意"
    condition: spec.rules.host contains '*'
    recommendation: "明示的ホスト名を設定"

  # =========================================================
  # 3. NetworkPolicy (36–45)
  # =========================================================
  - id: np_missing_default_deny_ingress
    target: k8s.networkpolicy
    severity: HIGH
    description: "デフォルト deny-ingress がない"
    condition: spec.policyTypes not contains "Ingress"
    recommendation: "Ingress のデフォルト拒否を設定"

  - id: np_allow_all_ingress
    target: k8s.networkpolicy
    severity: HIGH
    description: "Ingress が 0.0.0.0/0"
    condition: spec.ingress.from contains 0.0.0.0/0
    recommendation: "CIDR を制限する"

  - id: np_missing_default_deny_egress
    target: k8s.networkpolicy
    severity: HIGH
    description: "デフォルト deny-egress がない"
    condition: spec.policyTypes not contains "Egress"
    recommendation: "Egress のデフォルト拒否を設定"

  - id: np_allow_all_egress
    target: k8s.networkpolicy
    severity: HIGH
    description: "Egress 0.0.0.0/0 は危険"
    condition: spec.egress.to contains 0.0.0.0/0
    recommendation: "限定された宛先に制限"

  # =========================================================
  # 4. RBAC Security (46–55)
  # =========================================================
  - id: rbac_cluster_admin
    target: k8s.rbac
    severity: HIGH
    description: "cluster-admin 認めない"
    condition: role.rules contains '*'
    recommendation: "最小権限に修正する"

  - id: rbac_wildcard_verbs
    target: k8s.rbac
    severity: HIGH
    description: "verbs: '*' は禁止"
    condition: role.rules.verbs contains '*'
    recommendation: "verbs を具体的に指定"

  - id: rbac_rolebinding_namespace_mismatch
    target: k8s.rbac
    severity: MEDIUM
    description: "RoleBinding の namespace 不一致"
    condition: rolebinding.roleRef.namespace != metadata.namespace
    recommendation: "namespace を一致させる"

  # =========================================================
  # 5. Secret & Config Security (56–65)
  # =========================================================
  - id: secret_plaintext_password
    target: k8s.secret
    severity: HIGH
    description: "Secret に平文パスワード"
    condition: data contains 'password'
    recommendation: "外部 KMS や Secret Manager 使用"

  - id: configmap_plaintext_sensitive
    target: k8s.configmap
    severity: HIGH
    description: "機密情報を ConfigMap に保存している"
    condition: data contains '(password|token)'
    recommendation: "ConfigMap ではなく Secret を使う"

  # =========================================================
  # 6. Cloud Run Security (66–75)
  # =========================================================
  - id: cloudrun_public_access
    target: cloudrun.service
    severity: HIGH
    description: "Cloud Run が外部公開"
    condition: service.allow_unauthenticated == true
    recommendation: "認証を有効化する"

  - id: cloudrun_ingress_all
    target: cloudrun.service
    severity: MEDIUM
    description: "ingress: all は注意"
    condition: service.ingress == "all"
    recommendation: "internal への制限も検討"

  - id: cloudrun_cpu_never_throttle
    target: cloudrun.service
    severity: LOW
    description: "CPU AlwaysOn"
    condition: service.cpuThrottling == "never"
    recommendation: "コストに注意"

  - id: cloudrun_no_min_instances
    target: cloudrun.service
    severity: LOW
    description: "minInstances = 0 のため cold start あり"
    condition: service.minInstances == 0
    recommendation: "必要なら minInstances を設定"

  # =========================================================
  # 7. GitHub Actions Security (76–90)
  # =========================================================
  - id: ghactions_unpinned_version
    target: github.actions
    severity: HIGH
    description: "uses: のバージョン未固定"
    condition: step.uses not contains '@'
    recommendation: "バージョンを固定する"

  - id: ghactions_plaintext_secret
    target: github.actions
    severity: HIGH
    description: "環境変数に平文シークレット"
    condition: step.env contains 'password'
    recommendation: "GitHub Secrets を使う"

  - id: ghactions_privileged_container
    target: github.actions
    severity: HIGH
    description: "Docker の privileged 実行は禁止"
    condition: step.with.privileged == true
    recommendation: "privileged: false"

  - id: ghactions_checkout_unpinned
    target: github.actions
    severity: MEDIUM
    description: "actions/checkout が @v3 などで固定されていない"
    condition: step.uses contains 'actions/checkout' and step.uses not contains '@v'
    recommendation: "@v3 など明示する"

  # =========================================================
  # 8. Container Image Security (91–95)
  # =========================================================
  - id: container_root_user
    target: container.image
    severity: HIGH
    description: "コンテナが root で実行"
    condition: image.user == 0
    recommendation: "非 root ユーザーで実行する"

  - id: container_no_healthcheck
    target: container.image
    severity: LOW
    description: "Dockerfile に HEALTHCHECK がない"
    condition: dockerfile.HEALTHCHECK is null
    recommendation: "HEALTHCHECK を追加する"

  # =========================================================
  # 9. Terraform Security (96–100)
  # =========================================================
  - id: tf_gcs_bucket_public
    target: terraform.gcs
    severity: HIGH
    description: "GCS Bucket が public"
    condition: resource.access == "allUsers"
    recommendation: "IAM 制限を付ける"

  - id: tf_service_account_overprivileged
    target: terraform.serviceaccount
    severity: HIGH
    description: "サービスアカウントが過剰権限"
    condition: resource.iamRole contains 'admin'
    recommendation: "最小権限にする"

  - id: tf_vpc_firewall_allow_all
    target: terraform.firewall
    severity: HIGH
    description: "0.0.0.0/0 の許可"
    condition: firewall.cidr == "0.0.0.0/0"
    recommendation: "CIDR を絞る"

  - id: tf_cloudrun_public
    target: terraform.cloudrun
    severity: HIGH
    description: "Cloud Run に unauthenticated が許可されている"
    condition: service.unauthenticated == true
    recommendation: "IAM による認証を有効化"

  - id: tf_compute_instance_external_ip
    target: terraform.compute
    severity: MEDIUM
    description: "Compute に外部 IP が付いている"
    condition: instance.networkInterface.accessConfig is not null
    recommendation: "外部 IP を削除する"